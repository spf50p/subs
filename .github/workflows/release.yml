name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF#v}"
          mkdir -p dist
          for target in linux/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            out="dist/subs-${GOOS}-${GOARCH}"
            echo "building $out (version=$version)"
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${version}" \
              -o "$out" .
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/subs-*
          generate_release_notes: true
